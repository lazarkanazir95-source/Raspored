<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="app-version" content="2026070801">
  <title>Lista lica</title>
  <script>
    (function() {
      var V = '2026070801';
      fetch(location.pathname + '?_=' + Date.now(), { cache: 'no-store' })
        .then(function(r) { return r.text(); })
        .then(function(html) {
          var m = html.match(/name="app-version"\s+content="([^"]+)"/);
          if (m && m[1] !== V) { location.reload(true); }
        })
        .catch(function() {});
    })();
  </script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 560px;
      padding: 32px 28px;
    }

    h1 {
      font-size: 1.4rem;
      color: #1a1a2e;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 24px;
    }

    .divider {
      border: none;
      border-top: 1px solid #e8e8e8;
      margin-bottom: 20px;
    }

    .lista-wrap {
      position: relative;
    }

    #lista {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-right: 56px;
    }

    #lista-checked {
      margin-right: 56px;
    }

    #datum-sidebar, #datum-sidebar-2, #datum-sidebar-3 {
      position: absolute;
      right: 0;
      width: 50px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      writing-mode: vertical-lr;
      transform: rotate(180deg);
      font-size: 0.68rem;
      font-weight: 700;
      padding: 8px 0;
      letter-spacing: 0.4px;
    }

    #datum-sidebar {
      background: #e0e7ff;
      border: 1px solid #818cf8;
      color: #4338ca;
    }

    #datum-sidebar-2 {
      background: #bae6fd;
      border: 1px solid #38bdf8;
      color: #0369a1;
    }

    #datum-sidebar-3 {
      background: #fef9c3;
      border: 1px solid #fde047;
      color: #a16207;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #e8e8e8;
      background: #fafafa;
      transition: background 0.2s, border-color 0.2s, opacity 0.25s;
      cursor: pointer;
      user-select: none;
    }

    .item:hover {
      background: #f0f4ff;
      border-color: #b0bfff;
    }

    .broj {
      font-size: 0.78rem;
      font-weight: 700;
      color: #9b9b9b;
      min-width: 22px;
      text-align: right;
    }

    .item.top7 {
      background: #c7d2fe;
      border-color: #818cf8;
    }

    .item.top7:hover {
      background: #a5b4fc;
      border-color: #6366f1;
    }

    .item.top7 .broj {
      color: #4338ca;
    }

    .datum {
      font-size: 0.72rem;
      font-weight: 600;
      color: #4338ca;
      background: #e0e7ff;
      border: 1px solid #818cf8;
      border-radius: 6px;
      padding: 3px 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .item.mid7 {
      background: #bae6fd;
      border-color: #38bdf8;
    }

    .item.mid7:hover {
      background: #7dd3fc;
      border-color: #0ea5e9;
    }

    .item.mid7 .broj {
      color: #0369a1;
    }

    .item.mid14 {
      background: #fef9c3;
      border-color: #fde047;
    }

    .item.mid14:hover {
      background: #fef08a;
      border-color: #facc15;
    }

    .item.mid14 .broj {
      color: #a16207;
    }

    .ime {
      flex: 1;
      font-size: 0.97rem;
      color: #222;
      font-weight: 500;
    }

    .checkbox {
      width: 20px;
      height: 20px;
      accent-color: #4a6cf7;
      cursor: pointer;
      flex-shrink: 0;
    }

    .stats {
      margin-top: 20px;
      font-size: 0.82rem;
      color: #aaa;
      text-align: right;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 28px 28px 24px;
      width: 300px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal h2 {
      font-size: 1rem;
      color: #1a1a2e;
      margin: 0;
    }

    .modal p {
      font-size: 0.84rem;
      color: #888;
      margin: 0;
    }

    .modal input[type="password"] {
      border: 1.5px solid #ddd;
      border-radius: 7px;
      padding: 9px 12px;
      font-size: 1rem;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }

    .modal input[type="password"]:focus {
      border-color: #4a6cf7;
    }

    .modal input[type="password"].greska {
      border-color: #e74c3c;
      animation: shake 0.3s;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .modal-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 7px;
      border: none;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 500;
    }

    .btn-cancel {
      background: #f0f0f0;
      color: #555;
    }

    .btn-cancel:hover { background: #e0e0e0; }

    .btn-ok {
      background: #4a6cf7;
      color: #fff;
    }

    .btn-ok:hover { background: #3a5ce5; }

    .greska-tekst {
      font-size: 0.78rem;
      color: #e74c3c;
      display: none;
    }

    .greska-tekst.visible { display: block; }
  </style>
</head>
<body>
<div class="container">
  <h1>Lista lica</h1>
  <p class="subtitle">Označena lica automatski idu na dno liste.</p>
  <hr class="divider">

  <div class="lista-wrap">
    <ul id="lista"></ul>
    <ul id="lista-checked"></ul>
    <div id="datum-sidebar">11. - 12.07.2026.</div>
    <div id="datum-sidebar-2">18. - 19.07.2026.</div>
    <div id="datum-sidebar-3">25. - 26.07.2026.</div>
  </div>

  <div class="stats" id="stats">0 / 24 označeno</div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>Unesite šifru</h2>
    <p>Da biste premestili lice na dno liste, unesite šifru.</p>
    <input type="password" id="sifra-input" placeholder="Šifra..." maxlength="20">
    <span class="greska-tekst" id="greska-tekst">Pogrešna šifra. Pokušajte ponovo.</span>
    <div class="modal-buttons">
      <button class="btn btn-cancel" id="btn-cancel">Otkaži</button>
      <button class="btn btn-ok" id="btn-ok">Potvrdi</button>
    </div>
  </div>
</div>

<script>
  const DEFAULT_LICA = [
    "Aleksandar G.",
    "Marija T.",
    "Jovana Š.",
    "Ana J.",
    "Kosara S.",
    "Ivana M.",
    "Marija M.",
    "Nikola V.",
    "Marjan M.",
    "Teodora T.",
    "Nenad Ž.",
    "Marko M.",
    "Milan M.",
    "Lazar Kan.",
    "Jovan G.",
    "Nemanja M.",
    "Kristina M.",
    "Lazar Kal.",
    "Branko S.",
    "Marko P.",
    "Đorđe T.",
    "Ilija M.",
    "Miloš C.",
    "Bogdan Š."
  ];

  const SIFRA = '2708';
  const STORAGE_KEY = 'raspored-state-v11';

  function loadState() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) return JSON.parse(saved);
    } catch (e) {}
    return DEFAULT_LICA.map((ime, i) => ({ id: i, ime, checked: false }));
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();
  let pendingId = null;

  const lista = document.getElementById('lista');
  const listaChecked = document.getElementById('lista-checked');
  const stats = document.getElementById('stats');
const overlay = document.getElementById('modal-overlay');
  const sifraInput = document.getElementById('sifra-input');
  const greskaTekst = document.getElementById('greska-tekst');

  function checkItem(id) {
    const idx = state.findIndex(s => s.id === id);
    const [item] = state.splice(idx, 1);
    item.checked = true;
    state.push(item);
    saveState();
    render();
  }

  function uncheckItem(id) {
    const idx = state.findIndex(s => s.id === id);
    const [item] = state.splice(idx, 1);
    item.checked = false;
    const insertAt = state.findIndex(s => !s.checked && s.id > id);
    if (insertAt === -1) {
      const firstChecked = state.findIndex(s => s.checked);
      state.splice(firstChecked === -1 ? state.length : firstChecked, 0, item);
    } else {
      state.splice(insertAt, 0, item);
    }
    saveState();
    render();
  }

  function otvoriModal(id) {
    pendingId = id;
    sifraInput.value = '';
    sifraInput.classList.remove('greska');
    greskaTekst.classList.remove('visible');
    overlay.classList.add('active');
    setTimeout(() => sifraInput.focus(), 50);
  }

  function zatvoriModal() {
    overlay.classList.remove('active');
    pendingId = null;
  }

  function potvrdiSifru() {
    if (sifraInput.value === SIFRA) {
      const id = pendingId;
      zatvoriModal();
      checkItem(id);
    } else {
      sifraInput.classList.add('greska');
      greskaTekst.classList.add('visible');
      sifraInput.value = '';
      setTimeout(() => sifraInput.classList.remove('greska'), 400);
    }
  }

  document.getElementById('btn-ok').addEventListener('click', potvrdiSifru);
  document.getElementById('btn-cancel').addEventListener('click', zatvoriModal);
  sifraInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') potvrdiSifru();
    if (e.key === 'Escape') zatvoriModal();
  });
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) zatvoriModal();
  });

  function render() {
    lista.innerHTML = '';
    listaChecked.innerHTML = '';

    const aktivni = state.filter(s => !s.checked);
    const oznaceni = state.filter(s => s.checked);

    aktivni.forEach((s, i) => lista.appendChild(createItem(s, i + 1)));
    oznaceni.forEach((s, i) => listaChecked.appendChild(createItem(s, aktivni.length + i + 1)));

    stats.textContent = `${oznaceni.length} / ${DEFAULT_LICA.length} označeno`;
    requestAnimationFrame(pozicionirajDatum);
  }

  function pozicionirajDatum() {
    const wrap = document.querySelector('.lista-wrap');
    const wrapTop = wrap.getBoundingClientRect().top;

    const GAP = 6;

    const top7items = Array.from(lista.querySelectorAll('.item.top7'));
    const sidebar1 = document.getElementById('datum-sidebar');
    if (top7items.length > 0) {
      const firstTop = top7items[0].getBoundingClientRect().top - wrapTop;
      const lastBottom = top7items[top7items.length - 1].getBoundingClientRect().bottom - wrapTop + GAP;
      sidebar1.style.display = 'flex';
      sidebar1.style.top = firstTop + 'px';
      sidebar1.style.height = (lastBottom - firstTop) + 'px';
    } else {
      sidebar1.style.display = 'none';
    }

    const mid7items = Array.from(lista.querySelectorAll('.item.mid7'));
    const sidebar2 = document.getElementById('datum-sidebar-2');
    if (mid7items.length > 0) {
      const firstTop = mid7items[0].getBoundingClientRect().top - wrapTop;
      const lastBottom = mid7items[mid7items.length - 1].getBoundingClientRect().bottom - wrapTop + GAP;
      sidebar2.style.display = 'flex';
      sidebar2.style.top = firstTop + 'px';
      sidebar2.style.height = (lastBottom - firstTop) + 'px';
    } else {
      sidebar2.style.display = 'none';
    }

    const mid14items = Array.from(lista.querySelectorAll('.item.mid14'));
    const sidebar3 = document.getElementById('datum-sidebar-3');
    if (mid14items.length > 0) {
      const firstTop = mid14items[0].getBoundingClientRect().top - wrapTop;
      const lastBottom = mid14items[mid14items.length - 1].getBoundingClientRect().bottom - wrapTop + GAP;
      sidebar3.style.display = 'flex';
      sidebar3.style.top = firstTop + 'px';
      sidebar3.style.height = (lastBottom - firstTop) + 'px';
    } else {
      sidebar3.style.display = 'none';
    }
  }

  function createItem(s, pozicija) {
    const li = document.createElement('li');
    const boja = pozicija <= 7 ? ' top7' : pozicija <= 14 ? ' mid7' : pozicija <= 21 ? ' mid14' : '';
    li.className = 'item' + boja;
    li.innerHTML = `
      <span class="broj">${pozicija}.</span>
      <span class="ime">${s.ime}</span>
      <input class="checkbox" type="checkbox">
    `;

    if (s.checked) return li;

    const cb = li.querySelector('.checkbox');

    cb.addEventListener('change', (e) => {
      if (e.target.checked) {
        cb.checked = false;
        otvoriModal(s.id);
      }
    });

    li.addEventListener('click', (e) => {
      if (e.target !== cb) otvoriModal(s.id);
    });

    return li;
  }

  render();
</script>
</body>
</html>
